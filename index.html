<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Function Website</title>
<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=xyz"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  /* Ocean blue → lemon green gradient */
  background: linear-gradient(135deg, #5bc0eb, #d4ff72);
  font-size: 16px;
}

.header {
  text-align:center;
  font-weight:bold;
  font-size:36px;
  margin:20px 0;
  color:#111;
}

.container {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
  padding:20px;
}

.card {
  border-radius:15px;
  padding:15px;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}

/* Card Title Links Style */
.card-title-link {
  display: inline-block;
  margin-top: 0;
  margin-bottom: 15px; /* Keep spacing with elements below */
  font-weight: bold;
  font-size: 22px;
  text-decoration: none; /* Hide underline by default */
  transition: all 0.2s ease; /* Make color transition smoother */
  cursor: pointer; /* Change cursor to pointer on hover */
}

/* Card Title Links Hover Effect: Underline and Smart Invert Color Filter */
.card-title-link:hover {
  text-decoration: underline; /* Show underline on hover */
  filter: invert(1) hue-rotate(180deg); /* High contrast color inversion filter */
}

iframe {
  width:100%;
  height:300px;
  margin-bottom:10px;
  border:none;
}

/* Rich Text Editor Toolbar Style */
.editor-toolbar {
  background: #f1f1f1;
  border: 1px solid #ccc;
  border-bottom: none;
  padding: 5px;
  border-top-left-radius: 6px;
  border-top-right-radius: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.editor-toolbar button, .editor-toolbar select, .editor-toolbar input {
  padding: 3px 6px;
  font-size: 13px;
  cursor: pointer;
}

/* Rich Text Editor Content Area Style */
.editor-content {
  width:100%;
  height:800px;
  background: #fff;
  border: 1px solid #ccc;
  border-bottom-left-radius: 6px;
  border-bottom-right-radius: 6px;
  padding: 10px;
  box-sizing: border-box;
  overflow-y: auto;
  font-size: 16px;
}

.editor-content:focus {
  outline: none;
  border-color: #3a86ff;
}

.save-btn { 
  margin-top:10px; 
  padding: 8px 16px;
  font-size: 14px;
  align-self: flex-start;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="header">My Time In Malaysia</div>
<div class="container" id="container"></div>

<script>
// ==================== ⚠️ Firebase Configuration ⚠️ ====================
// Your dedicated Firebase Realtime Database credentials
const firebaseConfig = {
  apiKey: "AIzaSyCuN-BVa6GaX_8XPFSG0FMd8037zOt4d2g",
  authDomain: "math-cct.firebaseapp.com",
  databaseURL: "https://math-cct-default-rtdb.firebaseio.com",
  projectId: "math-cct",
  storageBucket: "math-cct.firebaseapp.com",
  messagingSenderId: "603371183762",
  appId: "1:603371183762:web:8ba3383b1d857336a0504b"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
// =======================================================================

const colors = [
"#ff7f11", // orange
"#ff3b3b", // red
"#9d4edd", // purple
"#38b000", // green
"#3a86ff", // blue
"#ffd60a", // yellow
"#00b4d8", // cyan
"#8d5524", // brown
"#ff66c4", // pink
"#6c757d"  // gray
];

// ✨ "Additional Function" has been successfully renamed to "Absolute Value Function"
const functions = [
{name:"Reciprocal Function", link:"https://www.desmos.com/calculator/cvdj2bem03"},
{name:"Reciprocal Square Function", link:"https://www.desmos.com/calculator/hwgozokqpe"},
{name:"Polynomial Function", link:"https://www.desmos.com/calculator/iwk1ormcr7"},
{name:"Trigonometric Asymptote Function", link:"https://www.desmos.com/calculator/hdarhxezos"},
{name:"Sinusoidal Function", link:"https://www.desmos.com/calculator/ksyci87tvt?lang=vi"},
{name:"Exponential Function", link:"https://www.desmos.com/calculator/lw3gyefznd"},
{name:"Exponential Function", link:"https://www.desmos.com/calculator/brard8s3ty"},
{name:"Extra Exponential Function", link:"https://www.desmos.com/calculator/n45amups5d"},
{name:"Extra Sinusoidal Function", link:"https://www.desmos.com/calculator/f5lk59t0tq"},
{name:"Absolute Value Function", link:"https://www.desmos.com/calculator/mewhbk8mq2"}
];

const container = document.getElementById('container');

functions.forEach((f, i)=>{
  const card = document.createElement('div');
  card.className='card';

  card.innerHTML = `
    <a href="${f.link}" target="_blank" class="card-title-link" style="color:${colors[i]}">
      ${f.name}
    </a>
    <iframe src="${f.link}"></iframe>
    
    <div class="editor-toolbar">
      <button type="button" onclick="execCmd('bold', '${i}')" title="Bold"><b>B</b></button>
      <button type="button" onclick="execCmd('underline', '${i}')" title="Underline"><u>U</u></button>
      
      <input type="color" onchange="execCmd('foreColor', '${i}', this.value)" title="Font Color">
      
      <select onchange="execCmd('fontName', '${i}', this.value)" title="Font Family">
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Georgia">Georgia</option>
        <option value="Impact">Impact</option>
        <option value="Comic Sans MS">Comic Sans MS</option>
        <option value="Microsoft YaHei">Microsoft YaHei</option>
        <option value="SimSun">SimSun</option>
      </select>

      <select onchange="execCmd('fontSize', '${i}', this.value)" title="Font Size">
        <option value="3">Normal</option>
        <option value="1">X-Small</option>
        <option value="2">Small</option>
        <option value="4">Medium</option>
        <option value="5">Large</option>
        <option value="6">X-Large</option>
        <option value="7">XX-Large</option>
      </select>
    </div>

    <div id="text${i}" class="editor-content" contenteditable="true" placeholder="Write your explanation..."></div>
    
    <button class="save-btn" onclick="saveToCloud(${i})">Save</button>
  `;

  container.appendChild(card);
});

function execCmd(command, index, value = null) {
  const editor = document.getElementById('text' + index);
  editor.focus();
  document.execCommand(command, false, value);
}

// Real-time Cloud Save Logic
function saveToCloud(i){
  const content = document.getElementById('text'+i).innerHTML;
  database.ref('notes/text_' + i).set({
    htmlContent: content,
    timestamp: Date.now()
  }).then(() => {
    alert('Saved to cloud successfully!');
  }).catch((error) => {
    alert('Save failed: ' + error.message);
  });
}

// Real-time Cloud Data Sync Listening Logic
window.onload = ()=>{
  functions.forEach((_, i)=>{
    database.ref('notes/text_' + i).on('value', (snapshot) => {
      const data = snapshot.val();
      const editor = document.getElementById('text' + i);
      if (data && document.activeElement !== editor) {
        editor.innerHTML = data.htmlContent;
      }
    });
  });
}
</script>

</body>
</html>
