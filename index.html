<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Function Website</title>
<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=xyz"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  /* Ocean blue → lemon green gradient */
  background: linear-gradient(135deg, #5bc0eb, #d4ff72);
  font-size: 16px;
}

.header {
  text-align:center;
  font-weight:bold;
  font-size:36px;
  margin:20px 0;
  color:#111;
}

.container {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
  padding:20px;
}

.card {
  border-radius:15px;
  padding:15px;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}

/* 🛠️ 新增：每个卡片标题的超链接基本样式 */
.card-title-link {
  display: inline-block;
  margin-top: 0;
  margin-bottom: 15px; /* 保持与下方组件的间距 */
  font-weight: bold;
  font-size: 22px;
  text-decoration: none; /* 默认情况下隐藏下划线 */
  transition: all 0.2s ease; /* 让鼠标悬停时的变色更丝滑 */
  cursor: pointer; /* 鼠标光标移入时变成小手 */
}

/* 🛠️ 新增：鼠标悬停（Hover）在标题上时的反色和下划线特效 */
.card-title-link:hover {
  text-decoration: underline; /* 鼠标悬停时出现下划线 */
  filter: invert(1) hue-rotate(180deg); /* 智能滤镜：无论标题原本是什么颜色，都会瞬间变成反色，形成强烈对比 */
}

iframe {
  width:100%;
  height:300px;
  margin-bottom:10px;
  border:none;
}

/* 富文本工具栏样式 */
.editor-toolbar {
  background: #f1f1f1;
  border: 1px solid #ccc;
  border-bottom: none;
  padding: 5px;
  border-top-left-radius: 6px;
  border-top-right-radius: 6px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.editor-toolbar button, .editor-toolbar select, .editor-toolbar input {
  padding: 3px 6px;
  font-size: 13px;
  cursor: pointer;
}

/* 富文本可编辑区域样式 */
.editor-content {
  width:100%;
  height:800px;
  background: #fff;
  border: 1px solid #ccc;
  border-bottom-left-radius: 6px;
  border-bottom-right-radius: 6px;
  padding: 10px;
  box-sizing: border-box;
  overflow-y: auto;
  font-size: 16px;
}

.editor-content:focus {
  outline: none;
  border-color: #3a86ff;
}

.save-btn { 
  margin-top:10px; 
  padding: 8px 16px;
  font-size: 14px;
  align-self: flex-start;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="header">My Time In Malaysia</div>
<div class="container" id="container"></div>

<script>
// ==================== ⚠️ 已经配置完毕 ⚠️ ====================
// 这里完整保留了你当前 index - 副本.txt 中的专属云数据库凭证 
const firebaseConfig = {
  apiKey: "AIzaSyCuN-BVa6GaX_8XPFSG0FMd8037zOt4d2g",
  authDomain: "math-cct.firebaseapp.com",
  databaseURL: "https://math-cct-default-rtdb.firebaseio.com",
  projectId: "math-cct",
  storageBucket: "math-cct.firebaseapp.com",
  messagingSenderId: "603371183762",
  appId: "1:603371183762:web:8ba3383b1d857336a0504b"
};

// 初始化 Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
// =========================================================

const colors = [
"#ff7f11", // orange
"#ff3b3b", // red
"#9d4edd", // purple
"#38b000", // green
"#3a86ff", // blue
"#ffd60a", // yellow
"#00b4d8", // cyan
"#8d5524", // brown
"#ff66c4", // pink
"#6c757d"  // gray (empty)
];

const functions = [
{name:"Reciprocal Function", link:"https://www.desmos.com/calculator/34zujzfoyj"},
{name:"Reciprocal Square Function", link:"https://www.desmos.com/calculator/hwgozokqpe"},
{name:"Polynomial Function", link:"https://www.desmos.com/calculator/iwk1ormcr7"},
{name:"Trigonometric Asymptote Function", link:"https://www.desmos.com/calculator/hdarhxezos?lang=vi"},
{name:"Sinusoidal Function", link:"https://www.desmos.com/calculator/ksyci87tvt?lang=vi"},
{name:"Exponential Function", link:"https://www.desmos.com/calculator/lw3gyefznd"},
{name:"Logarithmic Function", link:"https://www.desmos.com/calculator"},
{name:"Extra Exponential Function", link:"https://www.desmos.com/calculator/n45amups5d"},
{name:"Extra Sinusoidal Function", link:"https://www.desmos.com/calculator/f5lk59t0tq"},
{name:"Additional Function", link:"https://www.desmos.com/calculator/mewhbk8mq2"}
];

const container = document.getElementById('container');

functions.forEach((f, i)=>{
  const card = document.createElement('div');
  card.className='card';

  /* 🛠️ 修改部分：将原本的 <h3> 改为了 <a> 超链接标签 [cite: 13, 32] */
  /* href="${f.link}" 绑定了该卡片的 Desmos 链接 [cite: 13, 32] */
  /* target="_blank" 确保点击标题时，会在全新的浏览器标签页安全打开大图 [cite: 13, 32] */
  card.innerHTML = `
    <a href="${f.link}" target="_blank" class="card-title-link" style="color:${colors[i]}">
      ${f.name}
    </a>
    <iframe src="${f.link}"></iframe>
    
    <div class="editor-toolbar">
      <button type="button" onclick="execCmd('bold', '${i}')" title="加粗"><b>B</b></button>
      <button type="button" onclick="execCmd('underline', '${i}')" title="下划线"><u>U</u></button>
      
      <input type="color" onchange="execCmd('foreColor', '${i}', this.value)" title="字体颜色">
      
      <select onchange="execCmd('fontName', '${i}', this.value)" title="字体样式">
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Georgia">Georgia</option>
        <option value="Impact">Impact (粗黑体)</option>
        <option value="Comic Sans MS">Comic Sans MS (卡通体)</option>
        <option value="Microsoft YaHei">微软雅黑</option>
        <option value="SimSun">宋体</option>
      </select>

      <select onchange="execCmd('fontSize', '${i}', this.value)" title="字体大小">
        <option value="3">标准</option>
        <option value="1">极小</option>
        <option value="2">较小</option>
        <option value="4">中等</option>
        <option value="5">较大</option>
        <option value="6">大</option>
        <option value="7">极大</option>
      </select>
    </div>

    <div id="text${i}" class="editor-content" contenteditable="true" placeholder="Write your explanation..."></div>
    
    <button class="save-btn" onclick="saveToCloud(${i})">Save</button>
  `;

  container.appendChild(card);
});

function execCmd(command, index, value = null) {
  const editor = document.getElementById('text' + index);
  editor.focus();
  document.execCommand(command, false, value);
}

// 实时同步云端保存
function saveToCloud(i){
  const content = document.getElementById('text'+i).innerHTML;
  database.ref('notes/text_' + i).set({
    htmlContent: content,
    timestamp: Date.now()
  }).then(() => {
    alert('Saved to cloud successfully!');
  }).catch((error) => {
    alert('Save failed: ' + error.message);
  });
}

// 实时云端监听更新
window.onload = ()=>{
  functions.forEach((_, i)=>{
    database.ref('notes/text_' + i).on('value', (snapshot) => {
      const data = snapshot.val();
      const editor = document.getElementById('text' + i);
      if (data && document.activeElement !== editor) {
        editor.innerHTML = data.htmlContent;
      }
    });
  });
}
</script>

</body>
</html>
